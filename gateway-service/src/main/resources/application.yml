server:
  port: 8443
  ssl:
    enabled: true
    key-store: classpath:keystore.p12
    key-store-password: changeit
    key-store-type: PKCS12
    key-alias: my-ssl-cert
eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
spring:
  main:
    web-application-type: reactive
  cloud:
    gateway:

      default-filters:
        - PreserveHostHeader
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins: "https://localhost:4200"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: identity-service
          uri: lb://identity-service
          predicates:
            - Path=/identity-service/**
          filters:
            - RewritePath=/identity-service/(?<segment>.*), /${segment}
        - id: auth-server-authorize
          uri: lb://identity-service
          predicates:
            - Path=/.well-known/openid-configuration,/oauth2/authorize,/oauth2/token,/oauth2/jwks,/oauth2/revoke,/oauth2/introspect,/userinfo,/connect/**
        - id: auth-server-login
          uri: lb://identity-service
          predicates:
            - Path=/login,/logout,/register, /verify-otp, /forgot-password, /reset-password
        - id: profile-service
          uri: lb://profile-service
          predicates:
            - Path=/api/v1/profiles/**
        - id: profile-service-docs
          uri: lb://profile-service
          predicates:
            - Path=/profile-service/**
          filters:
            - RewritePath=/profile-service/(?<segment>.*), /${segment}
        - id: media-service
          uri: lb://media-service
          predicates:
            - Path=/api/v1/media/**
        - id: media-service-docs
          uri: lb://media-service
          predicates:
            - Path=/media-service/**
          filters:
            - RewritePath=/media-service/(?<segment>.*), /${segment}


springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Identity Service
        url: /identity-service/v3/api-docs
      - name: Profile Service
        url: /profile-service/v3/api-docs
      - name: Media Service
        url: /media-service/v3/api-docs



