server:
  port: 8086

spring:
  application:
    name: relation-service
  neo4j:
    uri: ${DBMSNSQL_CONNECTION}
    authentication:
      username: ${USERNAME_NSQL}
      password: ${PASSWORD_NSQL}
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://${SERVICE_IP}:8081/oauth2/jwks
          issuer-uri: https://localhost:8443

  kafka:
    bootstrap-servers: ${KAFKA_SERVER:localhost:29092}

    # --- CẤU HÌNH CHO BÊN GỬI (PRODUCER) ---
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false # Tắt cái này để Media Service dễ nhận diện event hơn

    # --- CẤU HÌNH CHO BÊN NHẬN (CONSUMER) ---
    consumer:
      group-id: relation-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.value.default.type: "com.commoncore.dto.event.BaseEvent"
        spring.json.trusted.packages: "com.commoncore.dto.event, com.commoncore.dto"
eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}