version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: clyvasync-postgres
    restart: always
    environment:
      POSTGRES_USER: ${USERNAME_RSQL}
      POSTGRES_PASSWORD: ${PASSWORD_RSQL}
      POSTGRES_DB: clyvasync_network
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    networks:
      - clyvasync-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USERNAME_RSQL} -d clyvasync_network"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka-clyvasync
    restart: always
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      # Định nghĩa 2 kênh: INTERNAL (cho Docker) và EXTERNAL (cho máy thật)
      - KAFKA_LISTENERS=INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka-clyvasync:9092,EXTERNAL://localhost:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    networks:
      - clyvasync-net

  redis:
    image: redis:latest
    container_name: clyvasync-redis
    restart: always
    command: redis-server --requirepass ${PASSWORD_REDIS}
    networks:
      - clyvasync-net

  # --- SPICEDB SETUP ---
  db-init:
    image: postgres:15
    environment:
      PGPASSWORD: ${PASSWORD_RSQL:-password}
    command: >
      sh -c "psql -h postgres -U ${USERNAME_RSQL} -d postgres -c 'CREATE DATABASE spicedb;' || true"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - clyvasync-net

  spicedb-migrate:
    image: authzed/spicedb:latest
    command: >
      migrate head 
      --datastore-engine postgres 
      --datastore-conn-uri "postgres://${USERNAME_RSQL}:${PASSWORD_RSQL}@postgres:5432/spicedb?sslmode=disable"
    depends_on:
      db-init:
        condition: service_completed_successfully
    networks:
      - clyvasync-net

  spicedb:
    image: authzed/spicedb:latest
    container_name: spicedb
    restart: always
    command: >
      serve 
      --datastore-engine postgres 
      --datastore-conn-uri "postgres://${USERNAME_RSQL}:${PASSWORD_RSQL}@postgres:5432/spicedb?sslmode=disable"
      --grpc-preshared-key "${SPICEDB_KEY}"
      --http-enabled
    depends_on:
      spicedb-migrate:
        condition: service_completed_successfully
    networks:
      - clyvasync-net

networks:
  clyvasync-net:
    name: clyvasync-net  # Ép tên cố định
    driver: bridge

volumes:
  pgdata: