server:
  port: 8082

spring:

  application:
    name: notification-service

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false
    check-template-location: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${USERNAME_MAIL}
    password: ${PASSWORD_MAIL}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  main:
    allow-bean-definition-overriding: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://${SERVICE_IP}:8081/oauth2/jwks
          issuer-uri: https://localhost:8443

  kafka:
    bootstrap-servers: ${KAFKA_SERVER:localhost:29092}

    # --- CẤU HÌNH CHO BÊN GỬI (PRODUCER) ---
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false # Tắt cái này để Media Service dễ nhận diện event hơn

    # --- CẤU HÌNH CHO BÊN NHẬN (CONSUMER) ---
    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.value.default.type: "com.commoncore.dto.event.BaseEvent"
        spring.json.trusted.packages: "com.commoncore.dto.event, com.commoncore.dto"
eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}