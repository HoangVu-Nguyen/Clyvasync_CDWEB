<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clyvasync Notification</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f7f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
<table border="0" cellpadding="0" cellspacing="0" width="100%">
    <tr>
        <td style="padding: 20px 0 30px 0;">
            <table align="center" border="0" cellpadding="0" cellspacing="0" width="600" style="border-collapse: collapse; border: 1px solid #cccccc; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                <!-- Header -->
                <tr>
                    <td align="center" bgcolor="#4361ee" style="padding: 40px 0 30px 0; color: #ffffff; font-size: 28px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px;">
                        Clyvasync
                    </td>
                </tr>
                <!-- Body -->
                <tr>
                    <td style="padding: 40px 30px 40px 30px;">
                        <table border="0" cellpadding="0" cellspacing="0" width="100%">
                            <tr>
                                <td style="color: #153643; font-size: 24px; font-weight: bold; padding-bottom: 20px;">
                                    <span th:text="${title}">Tiêu đề thông báo</span>
                                </td>
                            </tr>
                            <tr>
                                <td style="color: #444444; font-size: 16px; line-height: 24px; padding-bottom: 30px;">
                                    Xin chào <strong th:text="${email}">User</strong>,<br><br>
                                    <span th:text="${intro}">Lời dẫn thông báo từ hệ thống.</span>
                                </td>
                            </tr>
                            <!-- OTP Code Box -->
                            <tr>
                                <td align="center" style="padding: 20px 0;">
                                    <div style="display: inline-block; background-color: #f8f9fa; border: 2px dashed #4361ee; padding: 20px 40px; border-radius: 10px;">
                                        <span style="font-size: 36px; font-weight: bold; color: #4361ee; letter-spacing: 8px;" th:text="${code}">000000</span>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <td style="color: #888888; font-size: 14px; line-height: 20px; padding-top: 30px; text-align: center;">
                                    Mã xác thực này sẽ hết hạn trong <strong>15 phút</strong>.<br>
                                    Nếu bạn không thực hiện yêu cầu này, vui lòng bỏ qua email này.
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
                <!-- Footer -->
                <tr>
                    <td bgcolor="#f4f7f9" style="padding: 30px 30px 30px 30px; border-top: 1px solid #eeeeee;">
                        <table border="0" cellpadding="0" cellspacing="0" width="100%">
                            <tr>
                                <td style="color: #999999; font-size: 12px; text-align: center; line-height: 18px;">
                                    &copy; 2026 Clyvasync Team. All rights reserved.<br>
                                    Địa chỉ: Khu công nghệ cao, TP. Hồ Chí Minh.
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
