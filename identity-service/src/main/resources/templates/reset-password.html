<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge New Key - Clyvasync</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font chữ Pixel & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .font-headline { font-family: 'Press Start 2P', cursive; }

        /* Màu nền xanh Mario */
        .pixel-bg-mario {
            background-color: #c9ffbf;
            background-image: linear-gradient(rgba(0,0,0,0.05) 2px, transparent 2px), linear-gradient(90deg, rgba(0,0,0,0.05) 2px, transparent 2px);
            background-size: 40px 40px;
        }

        .pixel-border { border: 4px solid #000; box-shadow: 12px 12px 0 0 rgba(0,0,0,0.2); }
        .mario-input { border: 4px solid #000; box-shadow: inset -4px -4px 0 0 #bdc3c7; transition: transform 0.1s; outline: none; }
        .mario-input:focus { background-color: #ffffd0; box-shadow: inset -4px -4px 0 0 #fbd000; transform: translateY(-2px); }

        /* Đồi nền */
        .mario-hill-bg { border-top-left-radius: 80px; border-top-right-radius: 80px; border: 4px solid #000; }

        /* Nút A đỏ */
        .btn-mario-red { background-color: #ff0000; box-shadow: 0 8px 0 0 #a40009; transition: all 0.1s; }
        .btn-mario-red:active { transform: translateY(4px); box-shadow: 0 4px 0 0 #a40009; }
    </style>
</head>
<body class="pixel-bg-mario min-h-screen flex flex-col overflow-x-hidden relative">

<!-- TRANG TRÍ NỀN (Mây & Đồi) -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-80">
    <div class="absolute bottom-0 left-0 right-0 flex items-end justify-center gap-0">
        <div class="w-64 h-32 bg-[#43b047] mario-hill-bg translate-x-12 scale-90"></div>
        <div class="w-96 h-56 bg-[#2ecc71] mario-hill-bg z-10"></div>
        <div class="w-48 h-24 bg-[#43b047] mario-hill-bg -translate-x-12 scale-75"></div>
    </div>
</div>

<main class="relative z-10 flex-grow flex items-center justify-center p-4 md:p-8">

    <div class="w-full max-w-md bg-[#fefefe] p-8 md:p-10 pixel-border relative">

        <!-- HEADER -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-blue-500 border-4 border-black mx-auto mb-4 flex items-center justify-center shadow-[inset_-4px_-4px_0_0_#2980b9] animate-pulse">
                <span class="material-symbols-outlined text-white text-4xl">key</span>
            </div>
            <h1 class="font-headline text-2xl md:text-3xl font-black text-[#ff0000] uppercase drop-shadow-[2px_2px_0_#000] mb-2">
                NEW SECRET KEY
            </h1>
            <div class="bg-black text-[#fbd000] px-3 py-1 inline-block border-2 border-black">
                <p class="text-[10px] font-bold uppercase tracking-widest">STAGE 1-3: RESTORE POWER</p>
            </div>
        </div>

        <!-- THÔNG BÁO LỖI -->
        <div th:if="${error}" class="bg-red-600 border-4 border-black p-2 mb-6 text-white font-headline text-[9px] text-center uppercase animate-bounce">
            ! ERROR: <span th:text="${error}"></span> !
        </div>

        <!-- FORM ĐỔI MẬT KHẨU -->
        <form th:action="@{/reset-password}" method="post" class="space-y-6">

            <!-- Dữ liệu ngầm từ bước trước -->
            <input type="hidden" name="email" th:value="${email}">
            <input type="hidden" name="otp" th:value="${otp}">

            <div class="space-y-2">
                <label class="block font-headline text-[9px] font-bold text-black uppercase">Enter New Key</label>
                <div class="relative">
                    <input name="newPassword" type="password" required class="w-full bg-gray-50 p-4 font-bold text-sm mario-input" placeholder="••••••••">
                    <span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-gray-400">lock</span>
                </div>
            </div>

            <div class="space-y-2">
                <label class="block font-headline text-[9px] font-bold text-black uppercase">Confirm New Key</label>
                <div class="relative">
                    <input name="confirmPassword" type="password" required class="w-full bg-gray-50 p-4 font-bold text-sm mario-input" placeholder="••••••••">
                    <span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-gray-400">lock_reset</span>
                </div>
            </div>

            <!-- NÚT ACTION -->
            <div class="pt-4">
                <button type="submit" class="w-full btn-mario-red border-4 border-black px-6 py-5 flex items-center justify-between group">
                    <span class="font-headline text-sm md:text-base text-white drop-shadow-[2px_2px_0_#000]">SAVE CHANGES</span>
                    <div class="w-10 h-10 flex-shrink-0 bg-white border-4 border-black rounded-full flex items-center justify-center text-[#ff0000] font-bold text-xl shadow-[inset_-3px_-3px_0_#bdc3c7]">A</div>
                </button>
            </div>
        </form>

        <!-- Status Indicator -->
        <div class="mt-8 pt-6 border-t-4 border-dashed border-gray-200 flex justify-between items-center">
            <div class="flex gap-2">
                <div class="w-4 h-4 bg-green-500 border-2 border-black"></div>
                <div class="w-4 h-4 bg-green-500 border-2 border-black"></div>
                <div class="w-4 h-4 bg-[#fbd000] border-2 border-black animate-pulse"></div>
            </div>
            <span class="font-headline text-[8px] font-bold text-gray-400 tracking-widest uppercase">FINISHING...</span>
        </div>

    </div>
</main>

</body>
</html>
