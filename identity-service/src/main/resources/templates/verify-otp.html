<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Power-Up - Clyvasync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .font-headline { font-family: 'Press Start 2P', cursive; }
        .pixel-bg { background-color: #c9ffbf; background-image: linear-gradient(rgba(0,0,0,0.05) 2px, transparent 2px), linear-gradient(90deg, rgba(0,0,0,0.05) 2px, transparent 2px); background-size: 40px 40px; }
        .pixel-border-outer { border: 4px solid #000; }
        .mario-hill { border-top-left-radius: 80px; border-top-right-radius: 80px; border: 4px solid #000; position: relative; }
        .mario-input { background-color: #fff; border: 4px solid #000; box-shadow: inset -4px -4px 0 0 #bdc3c7; outline: none; transition: all 0.1s; }
        .mario-input:focus { background-color: #ffffd0; box-shadow: inset -4px -4px 0 0 #fbd000; transform: translateY(-2px); }
        .pixel-border-button { box-shadow: 0 8px 0 0 #a40009; transition: all 0.1s; border: 4px solid #000; }
        .pixel-border-button:active { transform: translateY(4px); box-shadow: 0 4px 0 0 #a40009; }
    </style>
</head>
<body class="pixel-bg font-body text-on-surface min-h-screen flex flex-col w-full overflow-x-hidden">

<!-- Nền trời và Đồi Mario -->
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
    <div class="absolute bottom-0 left-0 right-0 flex items-end justify-center gap-0">
        <div class="w-48 h-32 bg-[#43b047] mario-hill translate-y-4"></div>
        <div class="w-64 h-48 bg-[#2ecc71] mario-hill translate-y-8 z-10"></div>
        <div class="w-40 h-24 bg-[#43b047] mario-hill translate-y-4"></div>
    </div>
</div>

<main class="relative z-10 flex-grow flex items-center justify-center p-4 md:p-8">
    <div class="w-full max-w-md bg-[#fefefe] p-6 md:p-8 pixel-border-outer shadow-[12px_12px_0_0_rgba(0,0,0,0.2)]">

        <header class="text-center mb-10">
            <h1 class="font-headline text-3xl md:text-4xl font-black text-[#ff0000] leading-tight tracking-tighter uppercase mb-4 drop-shadow-[2px_2px_0_#000]">
                VERIFY KEY
            </h1>
            <div class="inline-flex items-center gap-2 md:gap-3 bg-[#e1ffd8] px-2 md:px-4 py-2 border-4 border-black shadow-[4px_4px_0_0_#000]">
                <span class="material-symbols-outlined text-black">mail</span>
                <span class="font-headline text-[8px] md:text-[10px] font-bold text-black" th:text="${email}">PLAYER@MAIL.COM</span>
            </div>
        </header>

        <!-- THÔNG BÁO LỖI / THÀNH CÔNG -->
        <div th:if="${error}" class="bg-red-600 border-4 border-black p-2 mb-6 text-white font-headline text-[9px] text-center">
            ERROR: <span th:text="${error}"></span>
        </div>
        <div th:if="${success}" class="bg-green-500 border-4 border-black p-2 mb-6 text-white font-headline text-[9px] text-center">
            <span th:text="${success}"></span>
        </div>

        <!-- FORM XÁC NHẬN OTP -->
        <form id="otpForm" th:action="@{/verify-otp}" method="post" class="space-y-8">
            <!-- Data ngầm gửi về Server -->
            <input type="hidden" name="type" th:value="${type}">
            <input type="hidden" name="email" th:value="${email}">
            <input type="hidden" name="code" id="finalCode">

            <!-- 6 Ô Input OTP (Giả sử OTP của bạn là 6 số) -->
            <div class="flex justify-between gap-1 md:gap-2 otp-group">
                <input class="w-10 h-12 md:w-14 md:h-16 text-center text-xl md:text-2xl font-black mario-input otp-box" maxlength="1" type="text" autocomplete="off"/>
                <input class="w-10 h-12 md:w-14 md:h-16 text-center text-xl md:text-2xl font-black mario-input otp-box" maxlength="1" type="text" autocomplete="off"/>
                <input class="w-10 h-12 md:w-14 md:h-16 text-center text-xl md:text-2xl font-black mario-input otp-box" maxlength="1" type="text" autocomplete="off"/>
                <input class="w-10 h-12 md:w-14 md:h-16 text-center text-xl md:text-2xl font-black mario-input otp-box" maxlength="1" type="text" autocomplete="off"/>
                <input class="w-10 h-12 md:w-14 md:h-16 text-center text-xl md:text-2xl font-black mario-input otp-box" maxlength="1" type="text" autocomplete="off"/>
                <input class="w-10 h-12 md:w-14 md:h-16 text-center text-xl md:text-2xl font-black mario-input otp-box" maxlength="1" type="text" autocomplete="off"/>
            </div>

            <div class="space-y-6">
                <button type="submit" id="submitBtn"
                        class="w-full bg-[#ff0000] text-white py-4 md:py-5 font-headline font-black text-lg md:text-xl uppercase pixel-border-button flex items-center justify-center gap-4">
                    <span class="w-8 h-8 md:w-10 md:h-10 rounded-full border-4 border-black flex items-center justify-center bg-white text-[#ff0000] shadow-[inset_-2px_-2px_0_#bdc3c7]">A</span>
                    CONFIRM
                </button>
            </div>
        </form>

        <!-- FORM GỬI LẠI OTP (Tách biệt để không dính chung với form ở trên) -->
        <form th:action="@{/resend-otp}" method="post" class="text-center mt-6">
            <input type="hidden" name="email" th:value="${email}">
            <input type="hidden" name="type" th:value="${type}">
            <button type="submit" class="inline-block group bg-transparent border-none cursor-pointer">
                    <span class="font-headline text-[10px] font-bold text-green-700 uppercase tracking-widest group-hover:text-[#ff0000] transition-colors">
                        [ RESEND LIFE (1UP) ]
                    </span>
            </button>
        </form>

        <!-- Status Indicator -->
        <div class="mt-10 pt-6 border-t-4 border-black flex justify-between items-center">
            <div class="flex gap-2">
                <div class="w-4 h-4 bg-[#fbd000] border-2 border-black"></div>
                <div class="w-4 h-4 bg-[#fbd000] border-2 border-black"></div>
                <div class="w-4 h-4 bg-gray-300 border-2 border-black opacity-30"></div>
            </div>
            <span class="font-headline text-[8px] font-bold text-black tracking-widest uppercase">STAGE 1-2</span>
        </div>
    </div>
</main>

<!-- JS Xử lý nhập OTP -->
<script>
    const inputs = document.querySelectorAll('.otp-box');
    const hiddenInput = document.getElementById('finalCode');
    const form = document.getElementById('otpForm');

    inputs.forEach((input, index) => {
        input.addEventListener('keyup', (e) => {
            // Nếu nhập số thì chuyển sang ô tiếp theo
            if (e.key >= 0 && e.key <= 9) {
                if (index < inputs.length - 1) inputs[index + 1].focus();
            }
            // Nếu bấm nút xóa (Backspace) thì lùi lại ô trước
            else if (e.key === 'Backspace') {
                if (index > 0) inputs[index - 1].focus();
            }
        });
    });

    // Trước khi submit, gom 6 ô thành 1 chuỗi nhét vào biến 'code'
    form.addEventListener('submit', (e) => {
        let code = '';
        inputs.forEach(input => code += input.value);
        hiddenInput.value = code;
    });
</script>
</body>
</html>
