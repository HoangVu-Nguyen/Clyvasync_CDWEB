<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warp Zone - Login Clyvasync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .font-headline { font-family: 'Press Start 2P', cursive; }

        .pixel-bg-mario {
            background-color: #c9ffbf;
            background-image:
                    linear-gradient(rgba(0,0,0,0.05) 2px, transparent 2px),
                    linear-gradient(90deg, rgba(0,0,0,0.05) 2px, transparent 2px);
            background-size: 40px 40px;
        }

        .pixel-border {
            border: 4px solid #000;
            box-shadow: 8px 8px 0 0 rgba(0,0,0,0.1);
        }

        .mario-hill-bg {
            border-top-left-radius: 80px;
            border-top-right-radius: 80px;
            border: 4px solid #000;
        }

        .mario-cloud {
            width: 60px; height: 30px;
            background: #fff; border-radius: 20px;
            border: 3px solid #000; position: absolute;
        }

        .warp-pipe-gradient {
            background: linear-gradient(90deg, #2ecc71, #a2f3a2, #27ae60);
        }

        /* Animation cho nút bấm */
        .btn-mario-red {
            background-color: #ff0000;
            box-shadow: 0 8px 0 0 #a40009;
            transition: all 0.1s;
        }
        .btn-mario-red:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 0 #a40009;
        }
    </style>
</head>
<body class="pixel-bg-mario min-h-screen flex flex-col overflow-x-hidden">

<main class="flex-grow relative flex items-center justify-center p-4 md:p-8 overflow-hidden">
    <!-- Decor Background -->
    <div class="absolute inset-0 z-0 pointer-events-none opacity-40">
        <div class="absolute bottom-0 w-full h-32 bg-green-700 opacity-10"></div>
        <div class="mario-cloud top-20 left-[15%] shadow-[8px_8px_0_0_#ffffff]"></div>
        <div class="mario-cloud top-40 right-[10%] shadow-[8px_8px_0_0_#ffffff] w-32"></div>
    </div>

    <!-- Hills Decor -->
    <div class="absolute bottom-0 left-0 right-0 flex items-end justify-center gap-0 pointer-events-none opacity-100">
        <div class="w-64 h-32 bg-[#43b047] mario-hill-bg translate-x-12 scale-90"></div>
        <div class="w-96 h-56 bg-[#2ecc71] mario-hill-bg z-10"></div>
        <div class="w-48 h-24 bg-[#43b047] mario-hill-bg -translate-x-12 scale-75"></div>
    </div>

    <div class="relative z-10 w-full max-w-5xl grid md:grid-cols-2 gap-12 items-center">

        <!-- Left Column -->
        <div class="space-y-8">
            <div class="space-y-4">
                <h1 class="font-headline text-5xl text-[#2ecc71] drop-shadow-[4px_4px_0_#000]">CLYVASYNC</h1>
                <h2 class="font-headline text-xl text-black">SELECT PLAYER</h2>
                <p class="text-white font-bold text-sm tracking-widest uppercase bg-[#2ecc71] inline-block p-2 border-2 border-black">Pick your save file to continue</p>
            </div>

            <div class="grid grid-cols-1 gap-4">
                <!-- Character Card -->
                <div class="flex items-center gap-6 p-6 bg-white pixel-border hover:bg-green-50 transition-all cursor-pointer group">
                    <div class="w-16 h-16 bg-red-500 border-4 border-black overflow-hidden relative">
                        <img src="https://preview.redd.it/mario-3d-art-pics-v0-kg2wmxvw4q4b1.png?width=1024&format=png&auto=webp&s=ee9b05d6bd0ccb051168f38a9dac20c03e8f091e" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-grow">
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-headline text-lg uppercase text-black">Mario Vane</span>
                            <span class="bg-green-500 text-white px-2 py-0.5 text-[8px] font-bold border border-black">LVL 99</span>
                        </div>
                        <p class="text-[10px] font-bold text-green-700 uppercase">World 1-4</p>
                    </div>
                </div>

                <a th:href="@{/register}" class="flex items-center justify-center gap-4 p-6 border-4 border-dashed border-green-600 bg-white/20 hover:bg-white/40 transition-all group no-underline">
                    <span class="material-symbols-outlined text-green-700">add_box</span>
                    <span class="font-headline text-sm text-green-800">New Adventure</span>
                </a>
            </div>
        </div>

        <!-- Right Column: Login Portal -->
        <div class="relative mt-12 md:mt-0">
            <!-- Pipe Decor -->
            <div class="hidden md:block absolute -top-12 left-1/2 -translate-x-1/2 w-48 h-12 warp-pipe-gradient border-4 border-black z-20 shadow-[0_8px_0_0_#003708]"></div>

            <div class="bg-white p-8 md:p-12 pixel-border relative z-10">

                <div class="text-center mb-6">
                    <div class="mb-4 inline-block animate-bounce">
                        <span class="material-symbols-outlined text-6xl text-red-600 drop-shadow-[4px_4px_0_#000]">videogame_asset</span>
                    </div>
                    <!-- Chữ LOGIN màu Đỏ -->
                    <h1 class="text-4xl font-headline font-bold text-[#ff0000] tracking-tighter mb-2 drop-shadow-[3px_3px_0px_#000]">LOGIN</h1>
                    <p class="text-[10px] font-bold uppercase text-gray-400 tracking-widest">Connect to Warp Zone</p>
                </div>

                <!-- Thông báo lỗi -->
                <div th:if="${param.error}" class="bg-red-600 border-4 border-black p-2 mb-4 text-white font-headline text-[8px] text-center">
                    ERROR: WRONG KEY!
                </div>

                <form th:action="@{/login}" method="post" class="space-y-5">
                    <div class="space-y-2">
                        <label class="block font-headline text-[10px] font-bold text-black uppercase">Player ID</label>
                        <input name="username" type="text" required class="w-full bg-gray-50 p-4 border-4 border-black outline-none focus:bg-white transition-colors" placeholder="MAIL@DOMAIN.COM">
                    </div>

                    <div class="space-y-2">
                        <label class="block font-headline text-[10px] font-bold text-black uppercase">Secret Key</label>
                        <input name="password" type="password" required class="w-full bg-gray-50 p-4 border-4 border-black outline-none focus:bg-white" placeholder="********">

                        <!-- MỤC FORGOT PASSWORD (Mario Style) -->
                        <div class="flex justify-end pt-2">
                            <a th:href="@{/forgot-password}" class="inline-flex items-center gap-2 font-headline text-[8px] text-gray-500 hover:text-[#ff0000] transition-colors group no-underline">
                                <span class="w-4 h-4 bg-[#fbd000] border-2 border-black flex items-center justify-center text-black text-[8px] group-hover:animate-bounce shadow-[2px_2px_0_0_#000]">?</span>
                                <span class="uppercase tracking-widest mt-0.5 border-b-2 border-dashed border-transparent group-hover:border-[#ff0000]">Lost Key?</span>
                            </a>
                        </div>
                    </div>

                    <!-- Nút START màu Đỏ -->
                    <div class="pt-2">
                        <button type="submit" class="w-full btn-mario-red border-4 border-black px-6 py-5 flex items-center justify-between group">
                            <span class="font-headline text-lg text-white drop-shadow-[2px_2px_0_#000]">START</span>
                            <div class="w-10 h-10 bg-white border-4 border-black rounded-full flex items-center justify-center text-[#ff0000] font-bold text-xl shadow-[inset_-3px_-3px_0_#bdc3c7]">A</div>
                        </button>
                    </div>
                </form>

                <div class="mt-8 flex justify-center gap-6 opacity-30 grayscale">
                    <span class="material-symbols-outlined text-black">security</span>
                    <span class="material-symbols-outlined text-black">speed</span>
                    <span class="material-symbols-outlined text-black">public</span>
                </div>
            </div>

            <div class="hidden md:block absolute -bottom-8 left-1/2 -translate-x-1/2 w-64 h-16 warp-pipe-gradient border-4 border-black z-0"></div>
        </div>
    </div>
</main>

</body>
</html>
