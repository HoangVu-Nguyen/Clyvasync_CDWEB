<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recover Your Life - Clyvasync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        .font-headline { font-family: 'Press Start 2P', cursive; }
        .pixel-border { border: 4px solid #000; }
        .pixel-bg { background-color: #c9ffbf; background-image: linear-gradient(rgba(0,0,0,0.05) 2px, transparent 2px), linear-gradient(90deg, rgba(0,0,0,0.05) 2px, transparent 2px); background-size: 40px 40px; }
    </style>
</head>
<body class="pixel-bg font-body text-on-surface min-h-screen flex flex-col items-center justify-center relative overflow-hidden">

<!-- 8-Bit Environmental Background -->
<div class="absolute inset-0 z-0 pointer-events-none">
    <div class="absolute bottom-0 w-full h-32 bg-green-900 opacity-10"></div>
    <div class="absolute bottom-32 left-0 right-0 flex items-end justify-around opacity-40">
        <div class="w-64 h-48 bg-green-700" style="clip-path: polygon(50% 0%, 0% 100%, 100% 100%);"></div>
        <div class="w-80 h-64 bg-green-800" style="clip-path: polygon(50% 0%, 0% 100%, 100% 100%);"></div>
    </div>
</div>

<main class="relative z-10 w-full max-w-lg px-6">
    <div class="bg-white pixel-border p-8 md:p-12 shadow-[12px_12px_0_0_rgba(0,0,0,0.1)]">

        <div class="flex flex-col items-center mb-10">
            <h1 class="font-headline font-black text-2xl md:text-3xl text-red-600 uppercase tracking-tighter text-center leading-tight drop-shadow-[2px_2px_0_#000]">
                RECOVER LIFE
            </h1>
            <p class="font-headline text-[8px] text-gray-500 mt-4 tracking-widest text-center leading-loose">
                LOST YOUR SECRET KEY?<br>ENTER YOUR IDENTITY BELOW.
            </p>
        </div>

        <!-- HIỂN THỊ LỖI -->
        <div th:if="${error}" class="bg-red-600 border-4 border-black p-2 mb-6 text-white font-headline text-[9px] text-center uppercase">
            ! <span th:text="${error}"></span> !
        </div>

        <!-- Recovery Form -->
        <form th:action="@{/forgot-password}" method="post" class="space-y-8">
            <div class="space-y-3">
                <label class="block font-headline text-[10px] font-black text-black tracking-widest uppercase">
                    PLAYER EMAIL
                </label>
                <div class="relative">
                    <div class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                        <span class="material-symbols-outlined">alternate_email</span>
                    </div>
                    <input name="email" required class="w-full bg-gray-50 border-4 border-black px-12 py-4 font-bold text-sm focus:bg-yellow-50 outline-none" placeholder="username@clyvasync.net" type="email"/>
                </div>
            </div>

            <div class="space-y-4">
                <button class="w-full bg-red-600 text-white font-headline font-black py-5 text-sm uppercase flex items-center justify-center space-x-4 border-4 border-black shadow-[0_6px_0_0_#a40009] active:shadow-none active:translate-y-[6px] transition-all" type="submit">
                    <span class="flex items-center justify-center w-8 h-8 bg-white text-red-600 rounded-sm border-2 border-black">A</span>
                    <span>SEND CODE</span>
                </button>

                <div class="flex justify-center pt-4">
                    <a th:href="@{/login}" class="group flex items-center space-x-2 font-headline text-[10px] text-gray-500 hover:text-red-600 transition-colors no-underline">
                        <span class="material-symbols-outlined text-sm">arrow_back</span>
                        <span>Back to Login</span>
                    </a>
                </div>
            </div>
        </form>
    </div>

    <!-- HUD Status Bar -->
    <div class="mt-8 flex justify-between items-center px-4 font-headline text-[8px] text-gray-600 uppercase tracking-widest">
        <div class="flex items-center space-x-4">
            <span class="flex items-center"><span class="material-symbols-outlined text-xs mr-1 text-red-600">favorite</span> HP: 1/100</span>
        </div>
        <span>MODE: RECOVERY</span>
    </div>
</main>
</body>
</html>
