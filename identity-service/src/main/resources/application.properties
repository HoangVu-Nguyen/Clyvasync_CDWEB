spring.application.name=identity-service
server.port=8081

eureka.client.enabled=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.datasource.url=${DBMSRSQL_CONNECTION}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${USERNAME_RSQL}
spring.datasource.password=${PASSWORD_RSQL}
spring.jpa.hibernate.ddl-auto=validate

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.enabled=true

spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

spring.flyway.baseline-on-migrate=true

spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public

spring.flyway.table=flyway_schema_history
server.servlet.session.cookie.http-only=false
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=strict
logging.level.org.springframework.security.oauth2.server.authorization=DEBUG
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
spring.data.redis.host=${REDIS_CONNECTION}
spring.data.redis.port=6379
spring.data.redis.password=${PASSWORD_REDIS}
spring.data.redis.timeout=2000


app.security.password.pepper=${PASSWORD_PEPPER}